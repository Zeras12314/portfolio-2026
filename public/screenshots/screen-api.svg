<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480">
  <rect width="720" height="480" fill="#0d1117"/>
  <!-- Terminal header -->
  <rect width="720" height="40" fill="#161b22"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <text x="360" y="25" font-family="monospace" font-size="12" fill="#6e7681" text-anchor="middle">api-gateway — zsh</text>

  <!-- Left panel: file tree -->
  <rect x="0" y="40" width="180" height="440" fill="#0d1117"/>
  <rect x="0" y="40" width="180" height="440" fill="rgba(255,255,255,0.02)"/>
  <text x="12" y="62" font-family="monospace" font-size="11" fill="#8b949e">EXPLORER</text>
  <text x="12" y="84" font-family="monospace" font-size="11" fill="#c9d1d9">▾ src</text>
  <text x="24" y="102" font-family="monospace" font-size="11" fill="#8b949e">▾ routes</text>
  <text x="36" y="118" font-family="monospace" font-size="10" fill="#58a6ff">auth.ts</text>
  <text x="36" y="134" font-family="monospace" font-size="10" fill="#58a6ff">users.ts</text>
  <text x="36" y="150" font-family="monospace" font-size="10" fill="#7ee787">gateway.ts</text>
  <text x="24" y="168" font-family="monospace" font-size="11" fill="#8b949e">▾ middleware</text>
  <text x="36" y="184" font-family="monospace" font-size="10" fill="#58a6ff">auth.ts</text>
  <text x="36" y="200" font-family="monospace" font-size="10" fill="#58a6ff">rateLimit.ts</text>
  <text x="36" y="216" font-family="monospace" font-size="10" fill="#58a6ff">logger.ts</text>
  <text x="24" y="234" font-family="monospace" font-size="11" fill="#8b949e">▾ services</text>
  <text x="36" y="250" font-family="monospace" font-size="10" fill="#58a6ff">redis.ts</text>
  <text x="36" y="266" font-family="monospace" font-size="10" fill="#58a6ff">jwt.ts</text>
  <text x="12" y="290" font-family="monospace" font-size="10" fill="#8b949e">package.json</text>
  <text x="12" y="306" font-family="monospace" font-size="10" fill="#8b949e">.env</text>
  <text x="12" y="322" font-family="monospace" font-size="10" fill="#8b949e">docker-compose.yml</text>

  <!-- Vertical divider -->
  <line x1="180" y1="40" x2="180" y2="480" stroke="#30363d" stroke-width="1"/>

  <!-- Main terminal content -->
  <text x="196" y="68" font-family="monospace" font-size="12" fill="#7ee787">→</text>
  <text x="212" y="68" font-family="monospace" font-size="12" fill="#c9d1d9">curl -X POST http://localhost:3000/api/auth/login \</text>
  <text x="212" y="86" font-family="monospace" font-size="12" fill="#c9d1d9">  -H "Content-Type: application/json" \</text>
  <text x="212" y="104" font-family="monospace" font-size="12" fill="#c9d1d9">  -d '{"email":"dev@example.com","password":"••••••••"}'</text>

  <!-- Response JSON block -->
  <rect x="196" y="118" width="508" height="148" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="210" y="138" font-family="monospace" font-size="11" fill="#8b949e">HTTP/1.1 200 OK</text>
  <text x="210" y="154" font-family="monospace" font-size="11" fill="#8b949e">Content-Type: application/json</text>
  <text x="210" y="170" font-family="monospace" font-size="11" fill="#8b949e">X-RateLimit-Remaining: 98</text>
  <line x1="210" y1="180" x2="692" y2="180" stroke="#30363d" stroke-width="0.5"/>
  <text x="210" y="198" font-family="monospace" font-size="11" fill="#c9d1d9">{</text>
  <text x="222" y="214" font-family="monospace" font-size="11" fill="#79c0ff">"token"</text>
  <text x="278" y="214" font-family="monospace" font-size="11" fill="#c9d1d9">:</text>
  <text x="288" y="214" font-family="monospace" font-size="11" fill="#a5d6ff">"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."</text>
  <text x="222" y="230" font-family="monospace" font-size="11" fill="#79c0ff">"expiresIn"</text>
  <text x="302" y="230" font-family="monospace" font-size="11" fill="#c9d1d9">:</text>
  <text x="312" y="230" font-family="monospace" font-size="11" fill="#d2a8ff">"7d"</text>
  <text x="222" y="246" font-family="monospace" font-size="11" fill="#79c0ff">"user"</text>
  <text x="270" y="246" font-family="monospace" font-size="11" fill="#c9d1d9">: { <tspan fill="#79c0ff">"id"</tspan>: <tspan fill="#d2a8ff">"u_01HXYZ"</tspan>, <tspan fill="#79c0ff">"role"</tspan>: <tspan fill="#d2a8ff">"admin"</tspan> }</text>
  <text x="210" y="258" font-family="monospace" font-size="11" fill="#c9d1d9">}</text>

  <!-- Second command -->
  <text x="196" y="288" font-family="monospace" font-size="12" fill="#7ee787">→</text>
  <text x="212" y="288" font-family="monospace" font-size="12" fill="#c9d1d9">curl http://localhost:3000/api/users \</text>
  <text x="212" y="306" font-family="monospace" font-size="12" fill="#c9d1d9">  -H "Authorization: Bearer $TOKEN"</text>

  <!-- Rate limit warning -->
  <rect x="196" y="320" width="508" height="60" rx="6" fill="rgba(255,153,0,0.08)" stroke="rgba(255,153,0,0.25)" stroke-width="1"/>
  <text x="210" y="342" font-family="monospace" font-size="11" fill="#d29922">⚠ Rate limit: 98/100 requests/min from 127.0.0.1</text>
  <text x="210" y="360" font-family="monospace" font-size="11" fill="#8b949e">X-RateLimit-Reset: 2024-12-01T10:01:00Z</text>
  <text x="210" y="374" font-family="monospace" font-size="11" fill="#8b949e">Retry-After: 45s</text>

  <!-- Third command + status -->
  <text x="196" y="406" font-family="monospace" font-size="12" fill="#7ee787">→</text>
  <text x="212" y="406" font-family="monospace" font-size="12" fill="#c9d1d9">docker-compose up -d</text>

  <text x="212" y="426" font-family="monospace" font-size="11" fill="#8b949e">Starting api-gateway_redis_1   ... </text>
  <text x="525" y="426" font-family="monospace" font-size="11" fill="#7ee787">done</text>
  <text x="212" y="442" font-family="monospace" font-size="11" fill="#8b949e">Starting api-gateway_app_1     ... </text>
  <text x="525" y="442" font-family="monospace" font-size="11" fill="#7ee787">done</text>

  <!-- Blinking cursor -->
  <rect x="196" y="460" width="8" height="14" rx="1" fill="#58a6ff" opacity="0.9"/>
</svg>
