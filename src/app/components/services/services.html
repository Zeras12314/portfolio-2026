<section class="services section" id="services">
  <div class="container">
    <div class="services__head">
      <div>
        <p class="eyebrow">What I Do</p>
        <h2 class="services__title">Services &amp; <span class="glow-text">Expertise</span></h2>
        <p class="services__sub">Turning complex problems into elegant, scalable solutions.</p>
      </div>
    </div>

    <div class="services__grid">
      @for (item of items; track item.title) {
        <article class="service-card glass-card">
          <div class="service-card__icon" [style.color]="item.color" [style.background]="item.color + '1a'">
            <iconify-icon [icon]="item.icon" width="26" height="26"></iconify-icon>
          </div>
          <h3 class="service-card__title">{{ item.title }}</h3>
          <p class="service-card__desc">{{ item.desc }}</p>
          <a href="#contact" class="service-card__link" [style.color]="item.color">
            Learn more →
          </a>
        </article>
      }
    </div>
  </div>
</section>
