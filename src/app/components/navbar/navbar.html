<header class="navbar">
  <div class="container navbar__inner">
    <a href="#home" class="navbar__logo">
      <span class="navbar__logo-box">
        <iconify-icon icon="lucide:code-2" width="18" height="18" style="color:white"></iconify-icon>
      </span>
      <span class="navbar__logo-text">Dev<strong>Folio</strong></span>
    </a>

    <nav class="navbar__nav">
      <a href="#home"     class="navbar__link navbar__link--active">Home</a>
      <a href="#services" class="navbar__link">Services</a>
      <a href="#projects" class="navbar__link">Projects</a>
      <a href="#resume"   class="navbar__link">Resume</a>
      <a href="#contact"  class="navbar__link">Contact</a>
    </nav>

    <div class="navbar__actions">
      <a href="#contact" class="btn btn--purple">Get Started</a>
    </div>

    <!-- Hamburger — animates to × when open -->
    <button
      class="navbar__hamburger"
      [class.navbar__hamburger--open]="menuOpen()"
      (click)="toggle()"
      aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile slide-down drawer -->
  @if (menuOpen()) {
    <nav class="navbar__mobile">
      <a href="#home"     class="navbar__mobile-link" (click)="close()">Home</a>
      <a href="#services" class="navbar__mobile-link" (click)="close()">Services</a>
      <a href="#projects" class="navbar__mobile-link" (click)="close()">Projects</a>
      <a href="#resume"   class="navbar__mobile-link" (click)="close()">Resume</a>
      <a href="#contact"  class="navbar__mobile-link" (click)="close()">Contact</a>
      <div class="navbar__mobile-cta">
        <a href="#contact" class="btn btn--purple" (click)="close()">Get Started</a>
      </div>
    </nav>
  }
</header>
